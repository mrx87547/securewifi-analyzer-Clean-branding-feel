[tool.ruff]
target-version = "py311"
line-length = 120
exclude = [".venv", "logs", "output"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM", "RUF"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-q --cov=. --cov-report=term-missing"
filterwarnings = ["error"]

[tool.coverage.run]
branch = true
source = ["analyzer", "config", "reporting", "risk_engine", "scanner", "utils", "main"]
omit = [".venv/*", "tests/*"]

[tool.coverage.report]
show_missing = true
skip_covered = true

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = true
warn_redundant_casts = true
exclude = ["\\.venv", "logs", "output"]

[tool.bandit]
exclude_dirs = [".venv", "tests", "logs", "output"]
